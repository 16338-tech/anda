<title>ช่องทางการติดต่อ</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"TH Sarabun New",Tahoma,sans-serif;
}

body{
    background:linear-gradient(135deg,#ffc1d6,#ffe3ef,#ffffff);
}

.container{
    width:85%;
    max-width:850px;
    margin:50px auto;
    background:#fff;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
    overflow:hidden;
}

.header{
    background:#ff4f8b;
    color:white;
    text-align:center;
    padding:30px;
}

.header h1{
    font-size:48px;
}

.content{
    padding:40px;
}

.info{
    display:flex;
    align-items:center;
    background:#fff0f6;
    border-left:8px solid #ff4f8b;
    border-radius:15px;
    padding:20px;
    margin-bottom:20px;
    transition:.3s;
}

.info:hover{
    transform:translateX(8px);
    box-shadow:0 8px 18px rgba(0,0,0,.15);
}

.icon{
    font-size:40px;
    margin-right:20px;
}

.text h2{
    color:#e91e63;
    margin-bottom:5px;
}

.text p{
    font-size:24px;
    color:#444;
}

.text a{
    color:#444;
    text-decoration:none;
}

.text a:hover{
    color:#e91e63;
}

.btn{
    display:block;
    width:220px;
    margin:35px auto 10px;
    background:#ff4f8b;
    color:white;
    text-decoration:none;
    text-align:center;
    padding:15px;
    border-radius:30px;
    font-size:24px;
    transition:.3s;
}

.btn:hover{
    background:#d81b60;
    transform:scale(1.05);
}

footer{
    text-align:center;
    background:#ffe4ec;
    color:#666;
    padding:15px;
    font-size:20px;
}
</style>

</head>
<body>

<div class="container">

    <div class="header">
        <h1>📞 ช่องทางการติดต่อ</h1>
    </div>

    <div class="content">

        <div class="info">
            <div class="icon">🏫</div>
            <div class="text">
                <h2>โรงเรียน</h2>
                <p>โรงเรียนพานทอง</p>

        </div>

        <div class="info">

            <div class="text">

                <p><a href="tel:0910519757">091-051-9757</a></p>
            </div>
        </div>
